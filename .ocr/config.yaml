# Open Code Review Configuration
# This file is installed to .ocr/config.yaml and customized per-project.
# Context here is injected into every review request.

# ─────────────────────────────────────────────────────────────────────────────
# PROJECT CONTEXT
# ─────────────────────────────────────────────────────────────────────────────

context: |
  Tech stack: Bash scripts (CLI), Markdown (personas/agent behavior), TOML (config)
  Architecture: NX monorepo with two packages — packages/cli (bash) and packages/personas (markdown)
  Runtime: pnpm, Node.js ≥20 (for NX tooling only — CLI itself is pure bash)
  State: Beads (Dolt database), .worker-status, .worker-feedback (three primitives only)
  Session management: tmux (one session, all projects, all agents)
  Critical constraint: Shell over runtime — if bash can do it, don't write TypeScript
  Critical constraint: Markdown is the control plane — agent behavior in .md files, not application code
  Critical constraint: Personas are ADDITIVE — they layer on top of existing project AI config

# ─────────────────────────────────────────────────────────────────────────────
# CONTEXT DISCOVERY
# ─────────────────────────────────────────────────────────────────────────────

context_discovery:
  openspec:
    enabled: true
    config: "openspec/config.yaml"
    specs: "openspec/specs/**/*.md"
    active_changes: "openspec/changes/**/*.md"

  references:
    - "AGENTS.md"
    - "CLAUDE.md"
    - ".windsurfrules"
    - ".github/copilot-instructions.md"
    - "CONTRIBUTING.md"
    - "openspec/AGENTS.md"

  additional:
    - "packages/personas/engineer.md"
    - "packages/personas/reviewer.md"

# ─────────────────────────────────────────────────────────────────────────────
# REVIEW RULES
# ─────────────────────────────────────────────────────────────────────────────

rules:
  critical:
    - Shell scripts missing error handling (set -e, unbound variables, unchecked exits)
    - Persona instructions that could cause agents to act outside their tier (e.g., engineer modifying beads)
    - Race conditions in tmux window management or worktree operations
    - Config resolution order violations (project > local > defaults)
  important:
    - Worktree isolation leaks (engineer reading outside its worktree)
    - Missing approval policy checks before spawn/review/merge actions
    - Persona markdown that contradicts the three-tier hierarchy
    - Hardcoded paths instead of resolving from orc symlink
  consider:
    - Bash portability across macOS and Linux
    - TOML config key naming consistency
    - Persona wording clarity and actionability

# ─────────────────────────────────────────────────────────────────────────────
# REVIEWER TEAM
# ─────────────────────────────────────────────────────────────────────────────

default_team:
  principal: 2
  quality: 2
  # security: 1   # Auto-added for auth/API/data changes
  # testing: 1    # Auto-added for logic-heavy changes

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT & WORKFLOW
# ─────────────────────────────────────────────────────────────────────────────

output:
  session_dir: ".ocr/sessions"

discourse:
  enabled: true

github:
  auto_prompt_post: false
  comment_format: "single"
