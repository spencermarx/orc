# OpenSpec Configuration for Orc
# This context is injected into every OpenSpec planning request.

schema: spec-driven

# ─────────────────────────────────────────────────────────────────────────────
# PROJECT CONTEXT
# ─────────────────────────────────────────────────────────────────────────────

context: |
  ## Purpose

  Orc is a lightweight multi-project agent orchestration layer for developers
  who want a few focused AI engineers per project with full visibility and
  final say. It coordinates AI coding agents across multiple projects using
  tmux for session management, git worktrees for isolation, Beads for work
  tracking, and markdown for agent behavior. The actual coding is performed
  by agentic CLIs (Claude Code, OpenCode, Codex, etc.) running in isolated
  worktrees.

  Orc adds coordination. It does not replace anything your agent already does.

  ## Goals

  - Coordinate AI coding agents across multiple projects on one machine
  - Propose, don't act — the orchestrator suggests, the human approves
  - Shell over runtime — if bash can do it, don't write TypeScript
  - Markdown is the control plane — agent behavior in .md files, not application code
  - Beads are the only state — no databases, no JSON status stores, no custom tracking
  - Inherit, don't duplicate — worktrees ARE the project, all AI config loads naturally
  - AI-native review — code review runs as a full agent session with project AI access

  ## Tech Stack

  | Component | Technology |
  |-----------|------------|
  | Monorepo | NX (integrated mode) |
  | Package Manager | pnpm |
  | CLI | Pure bash scripts (no build step) |
  | Personas | Pure markdown (no runtime dependencies) |
  | Configuration | TOML (config), Markdown (personas) |
  | Work tracking | Beads (Dolt database, MySQL wire-compatible) |
  | Board visualization | Abacus (default TUI), configurable |
  | Session management | tmux |
  | Agent adapter | String interpolation for any agentic CLI |

  ## Architecture

  Four-tier hierarchy:
  - **Root Orchestrator** — conversational session coordinating across projects
  - **Project Orchestrator** — receives user requests, decomposes into goals,
    dispatches goal orchestrators, monitors goal-level progress
  - **Goal Orchestrator** — owns one goal (feature/bug/task), runs as separate
    agent session, decomposes into beads, dispatches engineers, manages review
    loop, fast-forward merges approved beads to goal branch, handles delivery
  - **Engineers** — autonomous agent sessions in isolated git worktrees, each
    assigned a single bead

  Two-package NX monorepo:
  - `packages/cli/` — The `orc` command. Pure bash scripts. Entry point at
    `bin/orc`, subcommands in `lib/`. No build step — symlink and go.
  - `packages/personas/` — Default persona markdown files (root-orchestrator,
    orchestrator, engineer, reviewer). Versioned separately so persona
    improvements are independent of CLI changes.

  Key patterns:
  - Three-primitive state model: Beads (Dolt DB), .worker-status, .worker-feedback
  - Config resolution: project .orc/config.toml > config.local.toml > config.toml
  - Persona resolution: project .orc/{role}.md > packages/personas/{role}.md
  - Personas are ADDITIVE — they layer on top of CLAUDE.md, .claude/, .ocr/, etc.
  - Goal branches: type-prefixed (feat/, fix/, task/), configurable naming strategy
  - Bead branches: work/<goal>/<bead>, fast-forward merge to goal branch
  - Delivery: review mode (default, user inspects) or PR mode (push + gh pr create)
  - Review loop: engineer signals → reviewer agent in worktree → verdict → feedback cycle
  - Approval policy: spawn/review/merge gates, each "ask" or "auto"
  - tmux session layout: one session, three-level windows (project/goal/bead)
  - Agent adapter via string interpolation (no interfaces, no strategy pattern)

  ## Key Design Decisions

  | Decision | Rationale |
  |----------|-----------|
  | Pure bash CLI | Shell over runtime — no build step, no runtime dependencies |
  | Pure markdown personas | Human-editable, forkable, no runtime dependencies |
  | TOML configuration | Simple, readable, well-suited for hierarchical config |
  | Beads (Dolt) for state | Single source of truth, MySQL-compatible, community tooling |
  | tmux for sessions | Universal, composable, already on most dev machines |
  | String interpolation adapter | Works with any agent CLI without interfaces or abstractions |
  | Repo-only model (no dotdir) | One location for everything — ls shows all, git pull updates |
  | Gitignored local state | Same pattern as .env — well-understood convention |
  | Additive personas | Don't duplicate — inherit all project AI config via worktrees |
  | LLM-classified review verdicts | Not regex-matched — reviewer is a full agent session |

  ## Important Constraints

  ### Technical Constraints
  - CLI is pure bash — no TypeScript, no Node.js runtime for CLI logic
  - NX and pnpm are for monorepo structure only (workspace management)
  - Git 2.0+ required (worktrees)
  - tmux required (session management)
  - Beads (`bd` CLI) required (work tracking)
  - Config is TOML, not YAML or JSON
  - No secondary config location (~/.orc/) — repo IS the tool
  - Exit codes: 0 success, 1 usage error, 2 state error, 3 project not found

  ### Design Constraints
  - Engineers NEVER modify beads, push, merge, or create PRs
  - Orchestrators NEVER write application source code
  - Three state primitives only: Beads, .worker-status, .worker-feedback
  - Don't rebuild solved problems — use existing Beads community tooling
  - Propose, don't act — human approval gates by default
  - Max workers is configurable and enforced
  - Review max_rounds before escalating to human (default 3)

# ─────────────────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────────────────

rules:
  proposal:
    - Include impact assessment for cross-package changes (cli vs personas)
    - Mark breaking changes with **BREAKING** prefix
    - Reference affected specs by capability name
    - Assess impact on all three tiers (root orchestrator, project orchestrator, engineer)
    - Consider persona backward compatibility when changing agent behavior

  specs:
    - Use SHALL/MUST for normative requirements
    - Every requirement must have at least one scenario
    - Use #### Scenario: format (4 hashtags)
    - Keep scenarios testable with clear WHEN/THEN structure

  design:
    - Document alternatives considered
    - Include migration plan for breaking changes
    - Reference project conventions from this config
    - Justify any deviation from "shell over runtime" principle
    - Explain how new features interact with the approval policy

  tasks:
    - Break into 2-hour maximum chunks
    - Order by dependency (implement foundations first)
    - Include test tasks for new functionality
    - CLI tasks should include manual smoke test steps (no unit test framework for bash)

# ─────────────────────────────────────────────────────────────────────────────
# CODE STYLE CONVENTIONS
# ─────────────────────────────────────────────────────────────────────────────

conventions:
  bash:
    - Use set -euo pipefail at script top
    - Use shellcheck-clean code
    - Source _common.sh for shared helpers
    - Resolve orc repo path via readlink on the orc symlink
    - Use local for function variables
    - Quote all variable expansions
    - Use [[ ]] over [ ] for conditionals

  toml:
    - Section headers for logical grouping ([approval], [review], [board])
    - All fields optional in override files
    - Document default values in committed config.toml

  markdown:
    - ATX-style headers (#, ##, ###)
    - One blank line before and after headers
    - Fenced code blocks with language identifiers
    - Wrap prose at 80-100 characters
    - Personas: clear role boundaries, explicit "you never" sections

  naming:
    files: kebab-case (worker-status, orch-assignment.md)
    scripts: kebab-case (orc-review, _common.sh)
    commands: kebab-case subcommands (orc spawn, orc teardown)
    personas: lowercase role names (engineer, orchestrator, reviewer)
    projects: short lowercase keys in projects.toml (ia, wrkbelt, ocr)
    tmux_windows: '"{project}" or "{project}/{bead}" or "{project}/board"'

  git:
    commits: |
      Conventional commits: <type>(<scope>): <description>
      Types: feat, fix, docs, style, refactor, test, chore
      Scopes: cli, personas, docs, config
      Examples:
        feat(cli): add spawn command with worktree creation
        fix(cli): resolve symlink for orc repo path
        docs(personas): clarify engineer scope boundaries
        chore: update pnpm lockfile
    branches: |
      main: Production-ready
      feature/*: New features
      fix/*: Bug fixes
      docs/*: Documentation updates

# ─────────────────────────────────────────────────────────────────────────────
# TESTING PHILOSOPHY
# ─────────────────────────────────────────────────────────────────────────────

testing:
  approach: |
    CLI is bash — no unit test framework. Quality assurance via:
    - Manual smoke tests for each CLI subcommand
    - shellcheck for static analysis
    - Integration tests: register a project, spawn, review, teardown
    - Persona validation: ensure markdown renders correctly and role
      boundaries are clear

    For any future TypeScript code (NX plugins, utilities):
    Follow Khorikov's classical (Detroit) school of testing:
    - Test observable behavior, not implementation details
    - Use real dependencies; mock only external systems
    - Tests must survive refactoring without breaking
    - Verify outputs and side effects, not internal state

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN CONCEPTS
# ─────────────────────────────────────────────────────────────────────────────

domain:
  concepts:
    root_orchestrator: Conversational agent coordinating across multiple projects
    project_orchestrator: Agent at project root that decomposes requests into goals and dispatches goal orchestrators
    goal_orchestrator: Agent that owns one goal — plans beads, dispatches engineers, manages review loop, merges to goal branch, handles delivery
    engineer: Autonomous agent in isolated worktree with single bead assignment
    reviewer: Agent that evaluates engineer work and writes structured verdicts
    persona: Markdown file defining agent role and behavior boundaries
    goal: Named unit of delivery grouping related beads under one branch (feat/, fix/, task/)
    bead: Work item in Dolt database — single source of truth for tasks and dependencies
    goal_branch: Long-lived branch per goal, beads ff-merge into it, becomes the PR/review target
    worktree: Isolated git checkout where engineers work (under .worktrees/)
    worker_status: Plain text signal file at worktree root (working/review/blocked)
    worker_feedback: Structured review output written by reviewer agent
    assignment: Bead description rendered as .orch-assignment.md in the worktree
    approval_policy: Configurable gates (spawn/review/merge) — "ask" or "auto"
    delivery: Goal completion mode — "review" (present branch) or "pr" (push + create PR)
    branching_strategy: Natural language config field for branch naming conventions
    target_strategy: Natural language config field for PR target branch selection
    board: Visual bead management tool (Abacus default, configurable)
    adapter: String interpolation pattern for launching any agent CLI

  tiers:
    - Root orchestrator (coordinates projects, never writes code)
    - Project orchestrator (creates goals, dispatches goal orchestrators, never writes code)
    - Goal orchestrator (manages beads, engineers, review loop for one goal, never writes code)
    - Engineers (write code, never modify beads or push)

# ─────────────────────────────────────────────────────────────────────────────
# EXTERNAL DEPENDENCIES
# ─────────────────────────────────────────────────────────────────────────────

dependencies:
  required:
    - Git 2.0+ for worktree operations
    - tmux for session management
    - bd (Beads CLI) for work tracking
    - An agentic CLI (claude, opencode, codex, etc.)
    - pnpm for monorepo workspace management

  optional:
    - Abacus (Bubble Tea TUI for visual bead management)
    - Any MySQL client (Beads/Dolt is MySQL wire-compatible)
    - shellcheck for bash linting
