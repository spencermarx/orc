# Orc — committed defaults
# Override in config.local.toml (gitignored) or {project}/.orc/config.toml

[defaults]
agent_cmd = "claude"             # CLI to launch: claude, opencode, codex, gemini, auto, or any custom CLI
                                 # Adapters at packages/cli/lib/adapters/{name}.sh handle CLI-specific
                                 # prompt delivery, yolo flags, and command installation.
                                 # If no adapter matches, the generic fallback uses agent_template.
agent_flags = ""
agent_template = ""              # Custom launch template (overrides adapter). Placeholders:
                                 # {cmd} = agent_cmd, {prompt_file} = persona file path,
                                 # {prompt} = $(cat persona_file)
yolo_flags = ""                  # auto-accept flags per agent (--yolo); empty = use adapter defaults
                                 # Built-in: claude=--dangerously-skip-permissions,
                                 # codex=--dangerously-bypass-approvals-and-sandbox, gemini=--yolo
max_workers = 3

# ─── PLANNING ─────────────────────────────────────────────────────────────────
# These fields control the planning phase BEFORE engineers are dispatched.
# The goal orchestrator reads them but delegates execution to sub-agents.

[planning.goal]
plan_creation_instructions = ""  # WHO: executed by the PLANNER sub-agent (not the goal orchestrator)
                                 # WHEN: after codebase investigation, before bead decomposition
                                 # WHAT: the tool or approach that creates planning artifacts
                                 # SUPPORTS: slash commands, natural language, conditional logic
                                 # BOUNDARY: do NOT include bead decomposition guidance, engineer
                                 #   briefing instructions, or orchestration actions (like "notify the
                                 #   user" or "ask before proceeding") — those belong in other fields
                                 # e.g., "/openspec:proposal"
                                 # e.g., "If bug fix, skip. Otherwise run /openspec:proposal"
                                 # empty = no planning phase (goal orchestrator decomposes directly)
bead_creation_instructions = ""  # WHO: read by the GOAL ORCHESTRATOR (not a sub-agent)
                                 # WHEN: after plan artifacts are created, during bead decomposition
                                 # WHAT: how to map plan output to beads (project-specific conventions)
                                 # BOUNDARY: do NOT include planning tool directives — those belong in
                                 #   plan_creation_instructions above
                                 # e.g., "Decompose beads from tasks.md. Each bead = one or more tasks."
                                 # empty = goal orchestrator uses default judgment
when_to_involve_user_in_plan = "" # WHO: evaluated by the GOAL ORCHESTRATOR
                                  # WHEN: after planner completes, before bead decomposition
                                  # WHAT: condition for pausing to get user review of the plan
                                  # BOUNDARY: this is a GATE (when to pause), not an action (what to do)
                                  # e.g., "always", "never", "when the plan involves more than 3 beads"
                                  # empty = "always"

# ─── DISPATCH ─────────────────────────────────────────────────────────────────
# Controls what engineers receive when they start work.

[dispatch.goal]
assignment_instructions = ""     # WHO: read by the GOAL ORCHESTRATOR when writing .orch-assignment.md
                                 # WHEN: every time an engineer is dispatched (planned or unplanned goals)
                                 # WHAT: content to include in every engineer assignment, on top of bead
                                 #   description and acceptance criteria
                                 # BOUNDARY: do NOT include planning or review logic — just briefing content
                                 # e.g., "Include the proposal directory path. Quote tasks verbatim."
                                 # e.g., "Always include the test command and CLAUDE.md references."
                                 # empty = goal orchestrator uses default judgment

# ─── APPROVAL GATES ───────────────────────────────────────────────────────────
# Binary gates: "ask" (pause for confirmation) or "auto" (proceed immediately).
# These are separate from lifecycle hooks — they control WHETHER to pause, not
# what to do.

[approval]
ask_before_dispatching = "ask"   # Pause before spawning engineers? "ask" or "auto"
ask_before_reviewing = "auto"    # Pause before starting code review? "ask" or "auto"
ask_before_merging = "ask"       # Pause before merging approved beads? "ask" or "auto"

# ─── REVIEW ───────────────────────────────────────────────────────────────────
# Two tiers: dev review (per bead, fast) and goal review (full deliverable, deep).
# Review tools are executed by REVIEWER sub-agents, not the goal orchestrator.

[review.dev]
# Short cycle — every bead is reviewed before merging to the goal branch
review_instructions = ""         # WHO: executed by REVIEWER sub-agent
                                 # WHEN: after an engineer signals "review"
                                 # WHAT: how to perform the review (tool or guidelines)
                                 # BOUNDARY: review only — do NOT include delivery actions (like posting
                                 #   to a PR) or ticket updates. Those belong in [delivery.goal]
                                 # e.g., "Focus on security and type safety"
                                 # empty = built-in reviewer persona
how_to_determine_if_review_passed = ""  # WHO: evaluated by GOAL ORCHESTRATOR against reviewer output
                                 # WHAT: criteria for pass/fail — the orchestrator is the judge, not the reviewer
                                 # empty = parse VERDICT: approved from .worker-feedback
max_rounds = 3

[review.goal]
# Long cycle — after ALL beads pass dev review, before delivery
review_instructions = ""         # WHO: executed by REVIEWER sub-agent
                                 # WHEN: after all beads complete, before delivery
                                 # WHAT: how to perform the goal-level review (tool or guidelines)
                                 # BOUNDARY: review only — do NOT include delivery actions (like posting
                                 #   to a PR or transitioning tickets). Those belong in [delivery.goal]
                                 # empty = skip goal review, go straight to delivery
how_to_determine_if_review_passed = ""  # Same as [review.dev] — goal orchestrator evaluates
how_to_address_review_feedback = ""     # WHO: read by GOAL ORCHESTRATOR when creating corrective beads
                                        # WHAT: how engineers should fix rejected work
                                        # e.g., "Fix all must-fix items"
max_rounds = 3

# ─── BRANCHING ────────────────────────────────────────────────────────────────

[branching]
strategy = ""                # Natural language branch naming preference
                             # Default: feat/, fix/, task/ + ticket prefix if available
                             # e.g., "always use feat/ prefix" or "use JIRA ticket as prefix"

# ─── DELIVERY ─────────────────────────────────────────────────────────────────
# Controls what happens when a goal is complete and all reviews have passed.
# The goal orchestrator executes delivery actions DIRECTLY (not a sub-agent).

[delivery.goal]
on_completion_instructions = ""  # WHO: executed by GOAL ORCHESTRATOR directly
                                 # WHEN: after all beads complete and goal review passes
                                 # WHAT: the delivery pipeline — push, PR, ticket updates, archival, etc.
                                 # BOUNDARY: these are ACTIONS to execute. If you want to notify the user
                                 #   with results (like a PR URL), include that as the last step here.
                                 #   Do NOT put notification instructions in when_to_involve_user_in_delivery.
                                 # e.g., "Push the branch and create a PR targeting main"
                                 # e.g., "Push, create PR, archive openspec change, notify user with PR URL"
                                 # empty = present the branch for manual inspection (no auto-delivery)
when_to_involve_user_in_delivery = ""  # WHO: evaluated by GOAL ORCHESTRATOR
                                       # WHEN: BEFORE executing on_completion_instructions
                                       # WHAT: condition for pausing to get user approval before delivery runs
                                       # BOUNDARY: this is a GATE (when to pause), not an action. Do NOT
                                       #   put post-delivery behavior here — that goes in on_completion_instructions.
                                       # e.g., "always", "never", "when the PR targets main"
                                       # empty = "always"

# ─── INTEGRATIONS ─────────────────────────────────────────────────────────────

[agents]
ruflo = "off"                # "off" (default), "auto", or "require"

[notifications]
system = false               # true = send OS notifications (terminal-notifier on macOS, notify-send on Linux)
sound = false                # true = audible alert on notification

[updates]
check_on_launch = true       # false = disable update check on orc launch

[tickets]
strategy = ""                # WHO: interpreted by GOAL and PROJECT orchestrators
                             # WHEN: throughout the goal lifecycle (start, progress, completion, blocked)
                             # WHAT: how to keep external ticket trackers in sync
                             # BOUNDARY: this handles LIFECYCLE-WIDE ticket updates. One-time delivery
                             #   ticket actions (like "move to In Code Review when PR is created") can go
                             #   in on_completion_instructions instead to avoid duplication.
                             # e.g., "Move Jira tickets to In Development when goals start"
                             # empty = do not touch tickets

# ─── LAYOUT & THEME ──────────────────────────────────────────────────────────

[layout]
min_pane_width = 40          # minimum tmux pane width (columns) before creating overflow window
min_pane_height = 10         # minimum tmux pane height (rows) before creating overflow window

[board]
command = ""                 # empty = built-in fallback (watch bd list)

[theme]
enabled = true               # false = respect user's tmux theme, only set functional options
mouse = true                 # false = don't override mouse setting (only applies when themed)
accent = "#00ff88"            # primary accent (status bar, active borders, current window)
bg = "#0d1117"                # status bar background
fg = "#8b949e"                # status bar text
border = "#30363d"            # inactive pane/window borders
muted = "#6e7681"             # de-emphasized text (version, separators)
activity = "#d29922"          # window activity highlight
