# Orc — committed defaults
# Override in config.local.toml (gitignored) or {project}/.orc/config.toml

[defaults]
agent_cmd = "claude"             # CLI to launch: claude, opencode, codex, gemini, or any custom CLI
                                 # Adapters at packages/cli/lib/adapters/{name}.sh handle CLI-specific
                                 # prompt delivery, yolo flags, and command installation.
                                 # If no adapter matches, the generic fallback uses agent_template.
agent_flags = ""
agent_template = ""              # Custom launch template (overrides adapter). Placeholders:
                                 # {cmd} = agent_cmd, {prompt_file} = persona file path,
                                 # {prompt} = $(cat persona_file)
yolo_flags = ""                  # auto-accept flags per agent (--yolo); empty = use adapter defaults
                                 # Built-in: claude=--dangerously-skip-permissions,
                                 # codex=--dangerously-bypass-approvals-and-sandbox, gemini=--yolo
max_workers = 3

[planning.goal]
plan_creation_instructions = ""  # How to create the plan — given to a planner sub-agent after investigation
                                 # Can be a slash command, natural language, or both
                                 # e.g., "/openspec:proposal", "Create a design doc in .orc-state/goals/{goal}/plan.md"
                                 # empty = no planning phase (goal orchestrator decomposes directly)
bead_creation_instructions = ""  # How to create beads from plan artifacts — project-specific decomposition conventions
                                 # e.g., "Decompose beads from tasks.md. Each bead maps to one or more task items."
                                 # empty = goal orchestrator uses default judgment
when_to_involve_user_in_plan = "" # When to pause for user review before decomposing into beads
                                  # e.g., "always", "never", "when the plan involves more than 3 beads"
                                  # empty = "always"

[dispatch.goal]
assignment_instructions = ""     # What to include in every engineer's assignment when dispatched
                                 # Applied to ALL dispatches, whether from a plan or direct decomposition
                                 # e.g., "Include the full proposal directory path. Quote specific tasks verbatim."
                                 # e.g., "Always include the project's test command. Reference relevant CLAUDE.md sections."
                                 # empty = goal orchestrator uses default judgment

[approval]
ask_before_dispatching = "ask"   # "ask" = confirm before spawning workers, "auto" = proceed automatically
ask_before_reviewing = "auto"    # "ask" = confirm before starting reviews, "auto" = proceed automatically
ask_before_merging = "ask"       # "ask" = confirm before merging beads, "auto" = proceed automatically

[review.dev]
# Short cycle — bead-level review during development
review_instructions = ""     # how to perform the review — a slash command, natural language guidelines, or both
                             # empty = built-in reviewer persona
                             # e.g., "/my-review-tool", "Enforce strict type safety", or "/ocr:review — focus on security"
how_to_determine_if_review_passed = ""  # how to determine the review passed
                             # empty = parse VERDICT: approved from .worker-feedback
max_rounds = 3

[review.goal]
# Long cycle — goal-level review after all beads complete
review_instructions = ""     # how to perform the goal-level review; empty = skip (go straight to delivery)
                             # e.g., "/ocr:review" (see https://github.com/spencermarx/open-code-review)
how_to_determine_if_review_passed = ""  # how to determine the review passed
how_to_address_review_feedback = ""     # how engineers should address rejection feedback
max_rounds = 3

[branching]
strategy = ""                # Natural language branch naming preference
                             # Default: feat/, fix/, task/ + ticket prefix if available
                             # e.g., "always use feat/ prefix" or "use JIRA ticket as prefix"

[delivery.goal]
on_completion_instructions = ""  # What to do when a goal is complete — natural language or slash command
                                 # e.g., "push the goal branch and create a PR targeting develop"
                                 # e.g., "push the goal branch, create a PR targeting main, archive the openspec change"
                                 # empty = signal review to project orchestrator (today's default behavior)
when_to_involve_user_in_delivery = ""  # When to pause for user approval before executing delivery
                                       # e.g., "always", "never", "when the PR targets main"
                                       # empty = "always"

[agents]
ruflo = "off"                # "off" (default), "auto", or "require"

[notifications]
system = false               # true = send OS notifications (terminal-notifier on macOS, notify-send on Linux)
sound = false                # true = audible alert on notification

[updates]
check_on_launch = true       # false = disable update check on orc launch

[tickets]
strategy = "Move tickets to `In Development` when goals start, and `Ready for Code Review` when goals are complete"                # Natural language ticket integration strategy (project-level concern)
                             # empty = don't touch tickets
                             # e.g., "Move Jira tickets to In Progress when goals start, Done when complete"
                             # e.g., "Add a comment to Linear issues with the goal branch name"
                             # Requires the project to have a skill or MCP for the ticketing system

[layout]
min_pane_width = 40          # minimum tmux pane width (columns) before creating overflow window
min_pane_height = 10         # minimum tmux pane height (rows) before creating overflow window

[board]
command = ""                 # empty = built-in fallback (watch bd list)

[theme]
enabled = true               # false = respect user's tmux theme, only set functional options
mouse = true                 # false = don't override mouse setting (only applies when themed)
accent = "#00ff88"            # primary accent (status bar, active borders, current window)
bg = "#0d1117"                # status bar background
fg = "#8b949e"                # status bar text
border = "#30363d"            # inactive pane/window borders
muted = "#6e7681"             # de-emphasized text (version, separators)
activity = "#d29922"          # window activity highlight
